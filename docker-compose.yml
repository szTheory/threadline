services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threadline_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d threadline_test"]
      interval: 5s
      timeout: 5s
      retries: 10
