# Job id contract — stable YAML `jobs:` keys are relied on by docs and `act`:
# verify-format, verify-credo, verify-test, verify-pgbouncer-topology, verify-docs, verify-hex-package, verify-release-shape

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-format:
    name: Check formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.0"

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix verify.format

  verify-credo:
    name: Run Credo (strict)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.0"

      - name: Install dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix verify.credo

  verify-test:
    name: Run test suite
    runs-on: ubuntu-24.04
    env:
      DB_HOST: localhost
      MIX_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: threadline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.0"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix verify.test

      - name: Verify Threadline trigger coverage
        run: mix verify.threadline

      - name: Ensure threadline_phoenix_test database exists
        env:
          PGPASSWORD: postgres
        run: |
          createdb -h "$DB_HOST" -U postgres threadline_phoenix_test 2>/dev/null || true

      - name: Verify Threadline Phoenix example
        run: mix verify.example

      - name: Doc contract tests
        run: mix verify.doc_contract

  verify-pgbouncer-topology:
    name: PgBouncer transaction topology
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: threadline_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      pgbouncer:
        image: edoburu/pgbouncer:latest
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/threadline_test
          AUTH_TYPE: scram-sha-256
          POOL_MODE: transaction
          MAX_CLIENT_CONN: 200
          DEFAULT_POOL_SIZE: 5
        ports:
          - 6432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.0"

      - name: Wait for Postgres and PgBouncer
        env:
          PGPASSWORD: postgres
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done
          until pg_isready -h localhost -p 6432 -U postgres; do sleep 1; done

      - name: Bootstrap test DB (direct Postgres, bypass pooler)
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          THREADLINE_TOPOLOGY_BOOTSTRAP: "1"
        run: |
          mix deps.get
          mix compile --warnings-as-errors
          mix run priv/ci/topology_bootstrap.exs

      - name: Topology tests + verify_coverage through PgBouncer
        env:
          DB_HOST: localhost
          DB_PORT: "6432"
          THREADLINE_PGBOUNCER_TOPOLOGY: "1"
        run: |
          mix verify.topology
          mix verify.threadline

  verify-docs:
    name: Build ExDoc (dev)
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.0"

      - name: Install dependencies
        run: mix deps.get

      - name: Build docs
        run: mix docs

  verify-hex-package:
    name: Hex package tarball
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27.0"

      - name: Install dependencies
        run: mix deps.get

      - name: Build and inspect Hex tarball
        run: |
          set -euo pipefail
          mix hex.build
          shopt -s nullglob
          archives=(threadline-*.tar)
          if [[ ${#archives[@]} -eq 0 ]]; then
            echo "No threadline-*.tar produced" >&2
            exit 1
          fi
          for t in "${archives[@]}"; do
            # Hex wraps sources in contents.tar.gz inside the outer .tar
            if tar tf "$t" | grep -q '^contents\.tar\.gz$'; then
              tmp=$(mktemp -d)
              tar xf "$t" -C "$tmp" contents.tar.gz
              # grep -q can close the pipe early; without this, pipefail makes tar SIGPIPE fail the step
              set +o pipefail
              inner_ok=false
              if tar tzf "$tmp/contents.tar.gz" | grep -qE '^lib/'; then inner_ok=true; fi
              set -o pipefail
              if [[ "$inner_ok" == true ]]; then
                echo "OK: $t → contents.tar.gz contains lib/"
              else
                echo "contents.tar.gz missing lib/: $t" >&2
                set +o pipefail
                tar tzf "$tmp/contents.tar.gz" | head -40 >&2
                set -o pipefail
                rm -rf "$tmp"
                exit 1
              fi
              rm -rf "$tmp"
            elif tar tf "$t" | grep -qE '^lib/'; then
              echo "OK: $t contains lib/ at archive root"
            elif tar tf "$t" | grep -qE '^[^/]+/lib/'; then
              echo "OK: $t contains */lib/"
            else
              echo "Tarball missing expected layout: $t" >&2
              tar tf "$t" | head -40 >&2
              exit 1
            fi
          done

  verify-release-shape:
    name: Release metadata (version / changelog)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify CHANGELOG and @version alignment
        run: bin/verify-release-shape
